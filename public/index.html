<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canon Control Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="app-header">
    <div class="top-bar-left">
      <div class="app-title">
        <span>Canon</span>
        <span>Control</span>
        <span>Dashboard</span>
      </div>
    </div>

    <div class="top-bar-center">
      <button class="btn-rec-all" id="btn-rec-all" title="Trigger REC / STOP on all connected cameras">
        <span class="rec-all-label">REC ALL</span>
      </button>
    </div>

    <div class="top-bar-right" id="cam-rec-indicators"></div>
  </header>

  <main class="grid" id="camera-grid"></main>

  <!-- Camera config modal -->
  <div class="modal-backdrop" id="modal-backdrop" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-header">
        <h2 id="modal-title">Camera Settings</h2>
        <button class="btn-icon" id="modal-close" aria-label="Close">✕</button>
      </div>
      <form id="camera-form" class="modal-body">
        <input type="hidden" id="form-camId" />
        <div class="form-group">
          <label for="form-label">Camera Name</label>
          <div style="display:flex; gap:6px;">
            <input type="text" id="form-label" placeholder="e.g. Camera 1" style="flex:1;" />
            <button type="button" class="btn btn-outline" id="btn-update-name" title="Save name without reconnecting">Update</button>
          </div>
        </div>
        <div class="form-group">
          <label for="form-ip">IP Address</label>
          <input type="text" id="form-ip" placeholder="192.168.1.10" required />
        </div>
        <div class="form-group">
          <label for="form-username">Username</label>
          <input type="text" id="form-username" value="Full" placeholder="Full" />
        </div>
        <div class="form-group">
          <label for="form-password">Password</label>
          <input type="password" id="form-password" value="12345678" placeholder="12345678"
                 autocomplete="new-password" />
        </div>
        <div class="form-group">
          <label for="form-protocol">Camera Protocol</label>
          <select id="form-protocol">
            <option value="browserremote">XF / C Series – Browser Remote (XF705, XF405, C200, C100…)</option>
            <option value="xcprotocol" disabled>XC Series – XC Protocol (coming soon)</option>
          </select>
        </div>
        <div class="form-group" id="form-group-move" hidden>
          <label>Move to slot</label>
          <div style="display:flex; gap:6px; align-items:center;">
            <select id="form-move-slot" style="flex:1;"></select>
            <button type="button" class="btn btn-outline" id="btn-move-cam">Move</button>
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="btn-remove-cam" hidden style="color:var(--red);">Remove</button>
          <button type="button" class="btn btn-ghost" id="btn-disconnect-cam" hidden>Disconnect</button>
          <button type="submit" class="btn btn-primary">Connect</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
