<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canon Remote Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="app-header">
    <div class="app-title">
      <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M4 8l2-2h12l2 2v8l-2 2H6l-2-2V8z"/>
        <path d="M16 2l2 6"/>
        <path d="M8 2L6 8"/>
      </svg>
      Canon Remote Dashboard
    </div>
    <div class="header-controls">
      <button class="btn btn-sm btn-outline" id="btn-layout-toggle" title="Toggle layout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="8" height="8"/><rect x="13" y="3" width="8" height="8"/><rect x="3" y="13" width="8" height="8"/><rect x="13" y="13" width="8" height="8"/></svg>
      </button>
    </div>
  </header>

  <main class="grid" id="camera-grid">
    <!-- Camera panels injected by JS -->
  </main>

  <!-- Camera Config Modal -->
  <div class="modal-backdrop" id="modal-backdrop" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-header">
        <h2 id="modal-title">Camera Settings</h2>
        <button class="btn-icon" id="modal-close" aria-label="Close">✕</button>
      </div>
      <form id="camera-form" class="modal-body">
        <input type="hidden" id="form-camId" />
        <div class="form-group">
          <label for="form-label">Camera Name</label>
          <input type="text" id="form-label" placeholder="e.g. Camera 1" />
        </div>
        <div class="form-group">
          <label for="form-ip">IP Address</label>
          <input type="text" id="form-ip" placeholder="192.168.1.10" required />
        </div>
        <div class="form-group">
          <label for="form-username">Username</label>
          <input type="text" id="form-username" value="Full" placeholder="Full" />
        </div>
        <div class="form-group">
          <label for="form-password">Password</label>
          <input type="password" id="form-password" value="12345678" placeholder="12345678" />
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="btn-disconnect-cam">Disconnect</button>
          <button type="submit" class="btn btn-primary">Connect</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
