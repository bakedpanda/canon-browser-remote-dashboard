services:
  dashboard:
    build: .
    image: canon-remote-dashboard
    container_name: canon-dashboard
    restart: unless-stopped
    environment:
      - PORT=8847
    # host networking lets the container reach cameras directly on your LAN.
    # With this mode the server binds to the host's port 8847 directly —
    # no ports: mapping needed.
    # NOTE: network_mode: host works on Linux. On Docker Desktop (Mac/Windows)
    # use the commented-out bridge block below instead.
    network_mode: host

    # ── Docker Desktop (Mac / Windows) alternative ──────────────
    # Comment out network_mode above and uncomment these two lines:
    # network_mode: bridge
    # ports:
    #   - "8847:8847"
