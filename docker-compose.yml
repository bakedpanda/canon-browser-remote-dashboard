services:
  dashboard:
    build: .
    image: canon-remote-dashboard
    container_name: canon-dashboard
    restart: unless-stopped
    ports:
      - "8847:8847"
    environment:
      - PORT=8847
    # bridge works on Docker Desktop (Mac/Windows) — the Desktop VM
    # routes LAN traffic so the container can reach camera IPs.
    # On bare Linux Docker Engine, change to: network_mode: host
    network_mode: bridge
